name: Release

# Trigger: pushing a tag matching ``v*.*.*``. The tag MUST match the
# version in ./VERSION (single source of truth bumped via
# ``just bump <version>``); the verify step refuses otherwise.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match VERSION ($VERSION) — bump VERSION + commit before tagging"
            exit 1
          fi
          echo "Releasing v$VERSION"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: |
          uv sync
          pnpm install --frozen-lockfile

      - name: Build TypeScript packages
        run: pnpm -r run build

      - name: Publish Python packages to PyPI
        # Explicit list (not a glob) — keeps unreleased stubs/internals off PyPI.
        # Order: base SDK first, then leaf packages that depend on it.
        # Build artifacts go to the workspace-root ./dist/, so clear between
        # packages and publish one at a time for deterministic ordering.
        run: |
          for pkg in vystak \
                     vystak-transport-http \
                     vystak-transport-nats \
                     vystak-adapter-langchain \
                     vystak-channel-api \
                     vystak-channel-chat \
                     vystak-channel-slack \
                     vystak-provider-docker \
                     vystak-provider-azure \
                     vystak-cli \
                     vystak-chat; do
            rm -rf dist
            uv build --package "$pkg"
            uv publish
          done
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Publish TypeScript packages to npm
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set; skipping npm publish."
            exit 0
          fi
          pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
