name: Release

# Trigger: pushing a tag matching ``v*.*.*``. Python package versions
# come from the tag itself (via ``hatch-vcs``); npm package.json files
# are rewritten at publish time by scripts/bump_version.py.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs walks ``git describe`` to derive the version; a shallow
          # clone misses the tag and falls back to a "0.0.0+dev…" string.
          fetch-depth: 0

      - name: Read version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: |
          uv sync
          pnpm install --frozen-lockfile

      - name: Sync npm package.json versions to tag
        run: uv run python scripts/bump_version.py "${{ steps.version.outputs.version }}"

      - name: Build TypeScript packages
        run: pnpm -r run build

      - name: Publish Python packages to PyPI
        # Explicit list (not a glob) — keeps unreleased stubs/internals off PyPI.
        # Order: base SDK first, then leaf packages that depend on it.
        # Build artifacts go to the workspace-root ./dist/, so clear between
        # packages and publish one at a time for deterministic ordering.
        run: |
          for pkg in vystak \
                     vystak-transport-http \
                     vystak-transport-nats \
                     vystak-adapter-langchain \
                     vystak-channel-api \
                     vystak-channel-chat \
                     vystak-channel-slack \
                     vystak-provider-docker \
                     vystak-provider-azure \
                     vystak-cli \
                     vystak-chat; do
            rm -rf dist
            uv build --package "$pkg"
            uv publish
          done
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Publish TypeScript packages to npm
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set; skipping npm publish."
            exit 0
          fi
          pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
