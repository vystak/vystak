name: hello-agent
model:
  name: minimax
  provider:
    name: anthropic
    type: anthropic
  model_name: MiniMax-M2.7
  parameters:
    temperature: 0.7
    anthropic_api_url: https://api.minimax.io/anthropic
skills:
  - name: assistant
    tools:
      - get_weather
      - get_time
    prompt: |
      You are a helpful assistant. Be concise and friendly.
      When asked about the weather or time, use the available tools.
channels:
  - name: api
    type: api
secrets:
  - name: ANTHROPIC_API_KEY
