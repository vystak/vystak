name: hello-agent
instructions: |
  You are a helpful assistant built with AgentStack.
  Be concise, friendly, and always show your reasoning.
model:
  name: minimax
  provider:
    name: anthropic
    type: anthropic
  model_name: MiniMax-M2.7
  parameters:
    temperature: 0.7
    anthropic_api_url: https://api.minimax.io/anthropic
platform:
  name: docker
  type: docker
  provider:
    name: docker
    type: docker
sessions:
  type: sqlite
  provider:
    name: docker
    type: docker
skills:
  - name: assistant
    tools:
      - get_weather
      - get_time
channels:
  - name: api
    type: api
secrets:
  - name: ANTHROPIC_API_KEY
port: 8080
