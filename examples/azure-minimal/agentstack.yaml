name: azure-bot
instructions: |
  You are a minimal agent deployed to Azure Container Apps.
  Just chat and be helpful.
model:
  name: minimax
  provider:
    name: anthropic
    type: anthropic
  model_name: MiniMax-M2.7
  parameters:
    temperature: 0.7
    anthropic_api_url: https://api.minimax.io/anthropic
platform:
  name: aca
  type: container-apps
  provider:
    name: azure
    type: azure
    config:
      location: eastus2
channels:
  - name: api
    type: api
secrets:
  - name: ANTHROPIC_API_KEY
