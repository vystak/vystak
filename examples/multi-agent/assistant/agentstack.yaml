name: assistant-agent
instructions: |
  You are a helpful general-purpose assistant.
  When the user asks about weather, use ask_weather_agent.
  When the user asks about time, use ask_time_agent.
  If the user asks about BOTH weather and time, call BOTH tools at the same time.
model:
  name: minimax
  provider:
    name: anthropic
    type: anthropic
  model_name: MiniMax-M2.7
  parameters:
    temperature: 0.7
    anthropic_api_url: https://api.minimax.io/anthropic
platform:
  name: docker
  type: docker
  provider:
    name: docker
    type: docker
skills:
  - name: assistant
    tools:
      - ask_weather_agent
      - ask_time_agent
channels:
  - name: api
    type: api
secrets:
  - name: ANTHROPIC_API_KEY
port: 8082
