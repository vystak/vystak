providers:
  azure:
    type: azure
    config:
      location: eastus2
      resource_group: vystak-multi-v2-rg
  anthropic:
    type: anthropic

platforms:
  aca:
    type: container-apps
    provider: azure

models:
  minimax:
    provider: anthropic
    model_name: MiniMax-M2.7
    parameters:
      temperature: 0.7
      anthropic_api_url: https://api.minimax.io/anthropic

agents:
  - name: weather-agent
    instructions: You are a weather specialist. Use get_weather for real data.
    model: minimax
    platform: aca
    skills:
      - name: weather
        tools: [get_weather]
    channels:
      - name: api
        type: api
    secrets:
      - name: ANTHROPIC_API_KEY

  - name: time-agent
    instructions: You are a time specialist. Use get_time for current time.
    model: minimax
    platform: aca
    skills:
      - name: time
        tools: [get_time]
    channels:
      - name: api
        type: api
    secrets:
      - name: ANTHROPIC_API_KEY

  - name: assistant-agent
    instructions: You are a helpful assistant. Use ask_weather_agent and ask_time_agent.
    model: minimax
    platform: aca
    skills:
      - name: assistant
        tools: [ask_weather_agent, ask_time_agent]
    channels:
      - name: api
        type: api
    secrets:
      - name: ANTHROPIC_API_KEY
