[project]
name = "vystak-gateway"
version = "0.1.0"
description = "Vystak channel gateway — routes events to agents"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "vystak>=0.1.0",
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "httpx>=0.28",
    "slack-bolt>=1.21",
    "aiohttp>=3.9",
]

[project.scripts]
vystak-gateway = "vystak_gateway.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vystak_gateway"]

[tool.uv.sources]
vystak = { workspace = true }
