[project]
name = "vystak-adapter-mastra"
dynamic = ["version"]
description = "Vystak Mastra framework adapter"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "vystak>=0.1.0",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vystak_adapter_mastra"]

[tool.uv.sources]
vystak = { workspace = true }

[tool.hatch.version]
source = "vcs"
raw-options = {root = "../../.."}
