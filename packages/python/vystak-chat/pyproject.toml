[project]
name = "vystak-chat"
dynamic = ["version"]
description = "Vystak chat client — talk to your deployed agents"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "click>=8.0",
    "httpx>=0.28",
    "rich>=13.0",
    "pyyaml>=6.0",
    "prompt-toolkit>=3.0",
]

[project.scripts]
vystak-chat = "vystak_chat.cli:cli"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vystak_chat"]

[tool.hatch.version]
source = "vcs"
raw-options = {root = "../../.."}
