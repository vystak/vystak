[project]
name = "vystak-adapter-langchain"
dynamic = ["version"]
description = "Vystak framework adapter — generates LangChain/LangGraph agent code"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "Anatoliy Kolodkin", email = "11351966+akolodkin@users.noreply.github.com" },
]
keywords = ["vystak", "langchain", "langgraph", "agent", "ai", "codegen"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "vystak>=0.1.0",
    "asyncssh>=2.14",
]

[project.urls]
Homepage = "https://vystak.dev"
Documentation = "https://vystak.dev/docs"
Repository = "https://github.com/vystak/vystak"
Issues = "https://github.com/vystak/vystak/issues"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vystak_adapter_langchain"]

[tool.uv.sources]
vystak = { workspace = true }

[tool.hatch.version]
source = "vcs"
raw-options = {root = "../../.."}
