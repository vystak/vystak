[project]
name = "vystak-channel-api"
version = "0.1.0"
description = "Vystak REST API channel adapter"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "vystak>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vystak_channel_api"]

[tool.uv.sources]
vystak = { workspace = true }
