[project]
name = "agentstack"
version = "0.1.0"
description = "AgentStack core SDK — declarative AI agent orchestration"
requires-python = ">=3.11"
license = "Apache-2.0"
readme = "README.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentstack"]
