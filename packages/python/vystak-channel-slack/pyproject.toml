[project]
name = "vystak-channel-slack"
dynamic = ["version"]
description = "Vystak Slack channel — Socket Mode runner routing Slack events to agents"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "Anatoliy Kolodkin", email = "11351966+akolodkin@users.noreply.github.com" },
]
keywords = ["vystak", "channel", "slack", "agent"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "vystak>=0.1.0",
    "psycopg[binary]>=3.0",
]

[project.urls]
Homepage = "https://vystak.dev"
Repository = "https://github.com/vystak/vystak"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vystak_channel_slack"]

[tool.uv.sources]
vystak = { workspace = true }

[tool.hatch.version]
source = "vcs"
raw-options = {root = "../../.."}
